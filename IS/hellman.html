<!DOCTYPE html>
<html>

<head>
    <title>Diffie-Hellman</title>
</head>

<body>
    <h2>Diffie-Hellman Key Exchange</h2>

    <script>
        let p = 23;
        let g = 5;

        let a = 6; // Alice private
        let b = 15; // Bob private

        let A = (g ** a) % p;
        let B = (g ** b) % p;

        let key1 = (B ** a) % p;
        let key2 = (A ** b) % p;

        document.write("Alice Key: " + key1 + "<br>");
        document.write("Bob Key: " + key2);
    </script>

</body>

</html>
